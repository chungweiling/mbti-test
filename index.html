<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. 更改瀏覽器分頁顯示的名稱 -->
    <title>2026最新mbti測試</title>

    <!-- 2. 更改 LINE/FB 分享時顯示的名稱 (Open Graph) -->
    <meta property="og:title" content="2026最新mbti測試">
    <meta property="og:description" content="透過 10 個核心維度問題，精準掃描並解碼你的大腦運作模式。">
    <!-- 如果你有圖片網址，可以放在這裡，分享時就會有圖 -->
    <meta property="og:image" content=""> 

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYpIYY7h2nseUQxgVtxOTpFlGXhEej-fo",
            authDomain: "mbti-test-20b47.firebaseapp.com",
            databaseURL: "https://mbti-test-20b47-default-rtdb.firebaseio.com",
            projectId: "mbti-test-20b47",
            storageBucket: "mbti-test-20b47.firebasestorage.app",
            messagingSenderId: "957808705740",
            appId: "1:957808705740:web:ff84d9b36de997a3db8269",
            measurementId: "G-3V65MZ0GXC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveToCloud = async (userName, mbtiResult) => {
            try {
                const resultsRef = ref(db, 'mbti_results');
                const newResultRef = push(resultsRef);
                await set(newResultRef, {
                    name: userName,
                    result: mbtiResult,
                    timestamp: new Date().toISOString()
                });
                console.log("數據已成功同步至 Realtime 資料庫");
            } catch (e) {
                console.error("雲端同步失敗: ", e);
            }
        };
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #312e81 50%, #000000 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-1 { width: 400px; height: 400px; background: rgba(99, 102, 241, 0.5); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: rgba(168, 85, 247, 0.4); bottom: -20%; right: -10%; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 60px) scale(1.1); } }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative; z-index: 10;
        }
        .tech-btn { transition: all 0.3s ease; cursor: pointer; }
        .tech-btn:hover { box-shadow: 0 0 15px rgba(168, 85, 247, 0.6); transform: translateY(-2px); }
        .fade-in-up { animation: fadeInUp 0.6s forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .hidden-screen { display: none !important; }
        input::placeholder { color: rgba(165, 180, 252, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="w-full max-w-2xl relative z-10">
        
        <!-- 第一頁：身分輸入 -->
        <div id="welcome-screen" class="glass-card rounded-3xl p-8 md:p-12 text-center fade-in-up">
            <div class="inline-block p-4 rounded-full bg-indigo-500/20 mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <!-- 3. 更改網頁內的大標題 -->
            <h1 class="text-3xl md:text-4xl font-bold mb-6 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
                2026最新mbti測試
            </h1>
            <div class="mb-8 text-left">
                <label class="block text-indigo-300 text-sm mb-2 ml-1">請輸入您的代號 (姓名)</label>
                <input type="text" id="user-name" placeholder="例如：簡道乾" 
                       class="w-full bg-black/30 border border-indigo-500/50 rounded-xl p-4 text-center text-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                <p id="error-msg" class="text-red-400 text-sm mt-2 hidden text-center">請先輸入代號以連結系統</p>
            </div>
            <button onclick="startQuiz()" class="tech-btn bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-4 px-10 rounded-full text-lg shadow-lg w-full">
                進入掃描程序
            </button>
        </div>

        <!-- 測驗畫面與結果畫面保持不變 -->
        <div id="quiz-screen" class="glass-card rounded-3xl p-8 md:p-12 hidden-screen">
            <div class="mb-6 flex justify-between items-center text-sm text-indigo-300">
                <span id="display-name" class="font-bold uppercase tracking-widest">USER: 載入中...</span>
                <span id="progress-text">1 / 10</span>
            </div>
            <div class="w-full bg-gray-700/50 rounded-full h-1.5 mb-10 overflow-hidden">
                <div id="progress-bar-fill" class="bg-gradient-to-r from-indigo-400 to-purple-400 h-full transition-all duration-500" style="width: 10%"></div>
            </div>
            <div id="question-container" class="fade-in-up">
                <h2 id="question-text" class="text-2xl font-bold mb-8 leading-relaxed">載入問題...</h2>
                <div class="space-y-4">
                    <button onclick="selectOption('A')" id="option-a" class="tech-btn w-full text-left bg-white/5 border border-indigo-500/20 rounded-xl p-5 hover:bg-white/10"></button>
                    <button onclick="selectOption('B')" id="option-b" class="tech-btn w-full text-left bg-white/5 border border-indigo-500/20 rounded-xl p-5 hover:bg-white/10"></button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="glass-card rounded-3xl p-8 md:p-12 text-center hidden-screen">
            <h3 id="final-user-name" class="text-indigo-300 text-lg mb-2"></h3>
            <div class="text-7xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-400 tracking-tighter">
                <span id="result-mbti">XXXX</span>
            </div>
            <h2 id="result-title" class="text-2xl font-bold mb-4"></h2>
            <p id="result-desc" class="text-indigo-100 mb-8 bg-black/20 p-6 rounded-2xl border border-white/5 leading-relaxed text-left"></p>
            <div id="upload-status" class="flex items-center justify-center gap-2 text-xs text-emerald-400 mb-6 bg-emerald-400/10 py-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
                謝謝您的測試
            </div>
            <button onclick="location.reload()" class="tech-btn bg-white/10 border border-white/20 py-3 px-8 rounded-full hover:bg-white/20 transition-all">重新測試</button>
        </div>

    </div>

    <script>
        // 問題邏輯與 Profile 資料保持不變
        const questions = [
            { q: "1. 結束疲憊的一天後，你覺得怎麼休息最舒服？", optA: { text: "找好朋友聚聚、聊聊天，感覺比較有精神", trait: "E" }, optB: { text: "把自己關在房間安靜一下，不想跟任何人說話", trait: "I" } },
            { q: "2. 在滑社群媒體時，你比較會被哪種內容吸引？", optA: { text: "實用的生活攻略、或是朋友發生了什麼具體的事", trait: "S" }, optB: { text: "心靈雞湯、燒腦的理論或是很有創意的梗圖", trait: "N" } },
            { q: "3. 朋友被另一半甩了找你哭訴，你的反應通常是？", optA: { text: "幫他分析為什麼會分手，並給他實際的建議", trait: "T" }, optB: { text: "先抱抱他，陪他一起罵對方，讓他在情感上被支持", trait: "F" } },
            { q: "4. 明天要出國旅行，你現在的狀態是？", optA: { text: "行程表早就印好，每個景點的交通都查過了", trait: "J" }, optB: { text: "還沒開始收行李，打算到當地再看心情決定去哪", trait: "P" } },
            { q: "5. 在一群不熟的人中間，你通常是那個...？", optA: { text: "負責開話題的人，不說話會覺得尷尬", trait: "E" }, optB: { text: "默默滑手機或觀察大家的人，希望沒人注意到我", trait: "I" } },
            { q: "6. 當你在聽別人講解一件事情時，你比較在乎？", optA: { text: "細節跟具體的作法，沒講清楚我會很困惑", trait: "S" }, optB: { text: "大方向跟邏輯，細節之後再說也沒關係", trait: "N" } },
            { q: "7. 工作或做專案時，你比較像哪一種人？", optA: { text: "對事不對人，效率跟結果最重要，講實話沒關係", trait: "T" }, optB: { text: "對人不對事，希望能和諧相處，不要讓大家不高興", trait: "F" } },
            { q: "8. 房間或書桌的狀態，通常反映了你的什麼特質？", optA: { text: "東西都有固定的位置，我不喜歡亂七八糟", trait: "J" }, optB: { text: "亂中有序，我總能在這堆東西裡找到我要的", trait: "P" } },
            { q: "9. 去餐廳吃飯點餐時，你的風格是？", optA: { text: "看大家都點什麼，或是直接問店員推薦什麼", trait: "E" }, optB: { text: "自己看菜單研究很久，不需要別人插嘴", trait: "I" } },
            { q: "10. 看到一個新產品（如新款AI手機），你最感興趣的是？", optA: { text: "它到底強在哪？規格、價錢跟實際功能是什麼", trait: "S" }, optB: { text: "它能為未來生活帶來什麼改變？有沒有新玩法", trait: "N" } }
        ];

        const mbtiProfiles = {
            "INTJ": { title: "建築師 (Architect)", desc: "你是極具戰略眼光的思想家，看事情總能一眼穿透本質。你非常有規劃，不喜歡浪費時間在沒效率的事情上。" },
            "INTP": { title: "邏輯學家 (Logician)", desc: "你腦袋裡裝著一個宇宙。你喜歡鑽研感興趣的學問，比起跟人社交，你更喜歡拆解邏輯、尋找真理。" },
            "ENTJ": { title: "指揮官 (Commander)", desc: "你是天生的領袖。你充滿自信且意志堅定，擅長帶領大家在混亂中整理出秩序，達成最高目標。" },
            "ENTP": { title: "辯論家 (Debater)", desc: "你最討厭無聊！你反應靈敏，喜歡挑戰舊有規矩。你是腦力激盪的高手，總是能想出別人意想不到的點子。" },
            "INFJ": { title: "提倡者 (Advocate)", desc: "你是溫柔的洞察者。雖然安靜，但你對世界有深刻的理想，希望能透過自己的力量幫助他人，是極具影響力的精神導向。" },
            "INFP": { title: "調停者 (Mediator)", desc: "你是充滿詩意的夢想家。內心世界極其細膩，比起現實社會，你更重視精神上的自由與你所深信的價值觀。" },
            "ENFJ": { title: "主人翁 (Protagonist)", desc: "你是最能激勵人心的人。你天生帶有溫溫暖的光輝，能輕易察覺別人的需求，並帶領團隊走向更好的未來。" },
            "ENFP": { title: "競選者 (Campaigner)", desc: "你是最自由的靈魂！你充滿好奇心與活力，對生活充滿熱忱，能從簡單的事情中發現樂趣，身邊的人總被你的能量感染。" },
            "ISTJ": { title: "物流師 (Logistician)", desc: "你是最可靠的基石。你腳踏實地，重視規則與傳統。只要答應別人的事，你一定會負責到底，做得一絲不苟。" },
            "ISFJ": { title: "守衛者 (Defender)", desc: "你是默默付出的無名英雄。你溫柔、專注且非常有責任心，總是細心地守護著身邊的人，讓大家感到安心。" },
            "ESTJ": { title: "總經理 (Executive)", desc: "你是效率的化身。你做事非常有條理，善於整合資源。你相信努力工作與準時，是社會運作不可或缺的主力。" },
            "ESFJ": { title: "執政官 (Consul)", desc: "你是團體中的黏著劑。你熱愛社交、關心朋友。你總是知道如何照顧到每個人的情緒，讓氣氛變得輕鬆愉快。" },
            "ISTP": { title: "鑑賞家 (Virtuoso)", desc: "你是冷靜的觀察者。你喜歡親自動手做，或是探索機械、數據。面對突發狀況，你總能冷靜地用最實用的方式解決問題。" },
            "ISFP": { title: "探險家 (Adventurer)", desc: "你是活在當下的藝術家。你喜歡美的事物，擁有靈活且獨特的風格。比起規劃未來，你更喜歡探索眼前的無限驚喜。" },
            "ESTP": { title: "企業家 (Entrepreneur)", desc: "你是天生的行動派！你反應極快，敢於冒險，享受活在刺激與挑戰中。你是那種會直接衝上前解決問題的人。" },
            "ESFP": { title: "表演者 (Entertainer)", desc: "你就是派對中心！你大方、迷人且精力充沛。你最擅長讓大家開心，對於每一刻的感官體驗都極其敏感且熱愛。" }
        };

        let currentQuestionIndex = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        let userName = "";

        function startQuiz() {
            userName = document.getElementById('user-name').value.trim();
            if (!userName) {
                document.getElementById('error-msg').classList.remove('hidden');
                return;
            }
            document.getElementById('welcome-screen').classList.add('hidden-screen');
            document.getElementById('quiz-screen').classList.remove('hidden-screen');
            document.getElementById('display-name').innerText = `USER: ${userName}`;
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('question-container');
            container.classList.remove('fade-in-up');
            void container.offsetWidth; 
            container.classList.add('fade-in-up');

            const currentQ = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;
            document.getElementById('option-a').innerText = currentQ.optA.text;
            document.getElementById('option-b').innerText = currentQ.optB.text;
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-bar-fill').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
        }

        function selectOption(opt) {
            const trait = questions[currentQuestionIndex][opt === 'A' ? 'optA' : 'optB'].trait;
            scores[trait]++;
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) renderQuestion(); else showResult();
        }

        function showResult() {
            const finalMBTI = `${scores.E>=scores.I?'E':'I'}${scores.S>=scores.N?'S':'N'}${scores.T>=scores.F?'T':'F'}${scores.J>=scores.P?'J':'P'}`;
            const profile = mbtiProfiles[finalMBTI];

            document.getElementById('quiz-screen').classList.add('hidden-screen');
            const resScreen = document.getElementById('result-screen');
            resScreen.classList.remove('hidden-screen');
            resScreen.classList.add('fade-in-up');

            document.getElementById('final-user-name').innerText = `分析結果報告 - 對象：${userName}`;
            document.getElementById('result-mbti').innerText = finalMBTI;
            document.getElementById('result-title').innerText = profile.title;
            document.getElementById('result-desc').innerText = profile.desc;

            if (window.saveToCloud) {
                window.saveToCloud(userName, finalMBTI);
            }
        }
    </script>
</body>
</html>
