<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技感 MBTI 人格測驗</title>
    <!-- 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 科技感深色藍紫漸層背景 */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #312e81 50%, #000000 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 動態圓形元素動畫 (Blob) */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: rgba(99, 102, 241, 0.5); /* 靛藍色 */
            top: -10%; left: -10%;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: rgba(168, 85, 247, 0.4); /* 紫色 */
            bottom: -20%; right: -10%;
            animation-delay: -5s;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: rgba(56, 189, 248, 0.4); /* 淺藍色 */
            top: 40%; left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, 60px) scale(0.9); }
        }

        /* 簡潔玻璃卡片風格 (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            position: relative;
        }

        /* 按鈕科技感光暈與懸停動畫 */
        .tech-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .tech-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }
        .tech-btn:hover::before {
            left: 100%;
        }
        .tech-btn:hover {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            transform: translateY(-2px);
        }

        /* 滾動/切換顯影動畫 */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 隱藏元素用 */
        .hidden-screen {
            display: none !important;
        }
    </style>
</head>
<body class="flex items-center justify-center relative min-h-screen">

    <!-- 動態背景圓形元素 -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- 主要內容容器 -->
    <div class="w-full max-w-2xl px-4 py-8 relative z-10">
        
        <!-- 首頁畫面 -->
        <div id="welcome-screen" class="glass-card rounded-3xl p-8 md:p-12 text-center fade-in-up">
            <div class="inline-block p-4 rounded-full bg-indigo-500/20 mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-3xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
                AI 核心人格解析系統
            </h1>
            <p class="text-indigo-200 mb-8 text-lg">
                透過 10 個直覺式生活場景，掃描你的大腦運作模式（MBTI）。<br>準備好連接系統了嗎？
            </p>
            <button onclick="startQuiz()" class="tech-btn bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-3 px-8 rounded-full text-lg w-full md:w-auto shadow-lg">
                啟動分析序列
            </button>
        </div>

        <!-- 測驗畫面 -->
        <div id="quiz-screen" class="glass-card rounded-3xl p-8 md:p-12 hidden-screen">
            <div class="mb-8 flex justify-between items-center text-sm font-medium text-indigo-300">
                <span>系統分析進度</span>
                <span id="progress-text">1 / 10</span>
            </div>
            <!-- 進度條 -->
            <div class="w-full bg-gray-700/50 rounded-full h-2 mb-8 overflow-hidden">
                <div id="progress-bar-fill" class="bg-gradient-to-r from-indigo-400 to-purple-400 h-2 rounded-full transition-all duration-500" style="width: 10%"></div>
            </div>

            <!-- 問題區塊 -->
            <div id="question-container" class="fade-in-up min-h-[250px] flex flex-col justify-center">
                <h2 id="question-text" class="text-2xl md:text-3xl font-bold mb-8 leading-relaxed">
                    載入問題中...
                </h2>
                <div class="space-y-4 flex-grow">
                    <button onclick="selectOption('A')" id="option-a" class="tech-btn w-full text-left bg-white/5 hover:bg-white/10 border border-indigo-500/30 rounded-xl p-5 text-lg transition-all">
                        選項 A
                    </button>
                    <button onclick="selectOption('B')" id="option-b" class="tech-btn w-full text-left bg-white/5 hover:bg-white/10 border border-indigo-500/30 rounded-xl p-5 text-lg transition-all">
                        選項 B
                    </button>
                </div>
            </div>
        </div>

        <!-- 結果畫面 -->
        <div id="result-screen" class="glass-card rounded-3xl p-8 md:p-12 text-center hidden-screen">
            <h3 class="text-indigo-300 text-lg font-medium mb-2 uppercase tracking-widest">分析完成 - 你的核心代碼</h3>
            <div class="text-6xl md:text-8xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 via-indigo-400 to-purple-400 tracking-wider">
                <span id="result-mbti">XXXX</span>
            </div>
            <h2 id="result-title" class="text-2xl md:text-3xl font-bold mb-4 text-white">
                載入中...
            </h2>
            <p id="result-desc" class="text-indigo-100 text-lg mb-8 leading-relaxed bg-black/20 p-6 rounded-2xl border border-white/5">
                載入描述中...
            </p>

            <!-- 測驗數據數據裝飾 -->
            <div class="grid grid-cols-2 gap-4 mb-8 text-sm text-left">
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">能量方向 <span class="text-indigo-400 font-bold block text-lg" id="stat-ei"></span></div>
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">認知方式 <span class="text-purple-400 font-bold block text-lg" id="stat-sn"></span></div>
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">決策模式 <span class="text-cyan-400 font-bold block text-lg" id="stat-tf"></span></div>
                <div class="bg-white/5 p-3 rounded-lg border border-white/10">生活態度 <span class="text-pink-400 font-bold block text-lg" id="stat-jp"></span></div>
            </div>

            <button onclick="location.reload()" class="tech-btn bg-white/10 border border-white/20 hover:bg-white/20 text-white font-semibold py-3 px-8 rounded-full text-lg w-full md:w-auto">
                重新啟動分析
            </button>
        </div>

    </div>

    <!-- 測驗邏輯 JavaScript -->
    <script>
        // 改寫後的 10 個生活化問題
        const questions = [
            {
                q: "1. 結束疲憊的一天後，你覺得怎麼休息最舒服？",
                optA: { text: "找好朋友聚聚、聊聊天，感覺比較有精神", trait: "E" },
                optB: { text: "把自己關在房間安靜一下，不想跟任何人說話", trait: "I" }
            },
            {
                q: "2. 在滑社群媒體（如Threads或IG）時，你比較會被哪種內容吸引？",
                optA: { text: "實用的生活攻略、或是朋友發生了什麼具體的事", trait: "S" },
                optB: { text: "心靈雞湯、燒腦的理論或是很有創意的梗圖", trait: "N" }
            },
            {
                q: "3. 朋友被另一半甩了找你哭訴，你的反應通常是？",
                optA: { text: "幫他分析為什麼會分手，並給他實際的建議", trait: "T" },
                optB: { text: "先抱抱他，陪他一起罵對方，讓他在情感上被支持", trait: "F" }
            },
            {
                q: "4. 明天要出國旅行，你現在的狀態是？",
                optA: { text: "行程表早就印好，每個景點的交通都查過了", trait: "J" },
                optB: { text: "還沒開始收行李，打算到當地再看心情決定去哪", trait: "P" }
            },
            {
                q: "5. 在一群不熟的人中間，你通常是那個...？",
                optA: { text: "負責開話題的人，不說話會覺得尷尬", trait: "E" },
                optB: { text: "默默滑手機或觀察大家的人，希望沒人注意到我", trait: "I" }
            },
            {
                q: "6. 當你在聽別人講解一件事情時，你比較在乎？",
                optA: { text: "細節跟具體的作法，沒講清楚我會很困惑", trait: "S" },
                optB: { text: "大方向跟邏輯，細節之後再說也沒關係", trait: "N" }
            },
            {
                q: "7. 工作或做專案時，你比較像哪一種人？",
                optA: { text: "對事不對人，效率跟結果最重要，講實話沒關係", trait: "T" },
                optB: { text: "對人不對事，希望能和諧相處，不要讓大家不高興", trait: "F" }
            },
            {
                q: "8. 房間或書桌的狀態，通常反映了你的什麼特質？",
                optA: { text: "東西都有固定的位置，我不喜歡亂七八糟", trait: "J" },
                optB: { text: "亂中有序，我總能在這堆東西裡找到我要的", trait: "P" }
            },
            {
                q: "9. 去餐廳吃飯點餐時，你的風格是？",
                optA: { text: "看大家都點什麼，或是直接問店員推薦什麼", trait: "E" },
                optB: { text: "自己看菜單研究很久，不需要別人插嘴", trait: "I" }
            },
            {
                q: "10. 看到一個新產品（如新款AI手機），你最感興趣的是？",
                optA: { text: "它到底強在哪？規格、價錢跟實際功能是什麼", trait: "S" },
                optB: { text: "它能為未來生活帶來什麼改變？有沒有新玩法", trait: "N" }
            }
        ];

        // 16 型人格描述字典
        const mbtiProfiles = {
            "INTJ": { title: "建築師 (Architect)", desc: "你是極具戰略眼光的思想家，看事情總能一眼穿透本質。你非常有規劃，不喜歡浪費時間在沒效率的事情上。" },
            "INTP": { title: "邏輯學家 (Logician)", desc: "你腦袋裡裝著一個宇宙。你喜歡鑽研感興趣的學問，比起跟人社交，你更喜歡拆解邏輯、尋找真理。" },
            "ENTJ": { title: "指揮官 (Commander)", desc: "你是天生的領袖。你充滿自信且意志堅定，擅長帶領大家在混亂中整理出秩序，達成最高目標。" },
            "ENTP": { title: "辯論家 (Debater)", desc: "你最討厭無聊！你反應靈敏，喜歡挑戰舊有規矩。你是腦力激盪的高手，總是能想出別人意想不到的點子。" },
            "INFJ": { title: "提倡者 (Advocate)", desc: "你是溫柔的洞察者。雖然安靜，但你對世界有深刻的理想，希望能透過自己的力量幫助他人，是極具影響力的精神導向。" },
            "INFP": { title: "調停者 (Mediator)", desc: "你是充滿詩意的夢想家。內心世界極其細膩，比起現實社會，你更重視精神上的自由與你所深信的價值觀。" },
            "ENFJ": { title: "主人翁 (Protagonist)", desc: "你是最能激勵人心的人。你天生帶有溫暖的光輝，能輕易察覺別人的需求，並帶領團隊走向更好的未來。" },
            "ENFP": { title: "競選者 (Campaigner)", desc: "你是最自由的靈魂！你充滿好奇心與活力，對生活充滿熱忱，能從簡單的事情中發現樂趣，身邊的人總被你的能量感染。" },
            "ISTJ": { title: "物流師 (Logistician)", desc: "你是最可靠的基石。你腳踏實地，重視規則與傳統。只要答應別人的事，你一定會負責到底，做得一絲不苟。" },
            "ISFJ": { title: "守衛者 (Defender)", desc: "你是默默付出的無名英雄。你溫柔、專注且非常有責任心，總是細心地守護著身邊的人，讓大家感到安心。" },
            "ESTJ": { title: "總經理 (Executive)", desc: "你是效率的化身。你做事非常有條理，善於整合資源。你相信努力工作與準時，是社會運作不可或缺的主力。" },
            "ESFJ": { title: "執政官 (Consul)", desc: "你是團體中的黏著劑。你熱愛社交、關心朋友。你總是知道如何照顧到每個人的情緒，讓氣氛變得輕鬆愉快。" },
            "ISTP": { title: "鑑賞家 (Virtuoso)", desc: "你是冷靜的觀察者。你喜歡親自動手做，或是探索機械、數據。面對突發狀況，你總能冷靜地用最實用的方式解決問題。" },
            "ISFP": { title: "探險家 (Adventurer)", desc: "你是活在當下的藝術家。你喜歡美的事物，擁有靈活且獨特的風格。比起規劃未來，你更喜歡探索眼前的無限驚喜。" },
            "ESTP": { title: "企業家 (Entrepreneur)", desc: "你是天生的行動派！你反應極快，敢於冒險，享受活在刺激與挑戰中。你是那種會直接衝上前解決問題的人。" },
            "ESFP": { title: "表演者 (Entertainer)", desc: "你就是派對中心！你大方、迷人且精力充沛。你最擅長讓大家開心，對於每一刻的感官體驗都極其敏感且熱愛。" }
        };

        let currentQuestionIndex = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        const welcomeScreen = document.getElementById('welcome-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionContainer = document.getElementById('question-container');
        const questionText = document.getElementById('question-text');
        const optionABtn = document.getElementById('option-a');
        const optionBBtn = document.getElementById('option-b');
        const progressText = document.getElementById('progress-text');
        const progressBarFill = document.getElementById('progress-bar-fill');

        function startQuiz() {
            welcomeScreen.classList.add('hidden-screen');
            quizScreen.classList.remove('hidden-screen');
            renderQuestion();
        }

        function renderQuestion() {
            questionContainer.classList.remove('fade-in-up');
            void questionContainer.offsetWidth; 
            questionContainer.classList.add('fade-in-up');

            const currentQ = questions[currentQuestionIndex];
            questionText.innerText = currentQ.q;
            
            optionABtn.innerText = currentQ.optA.text;
            optionABtn.setAttribute('data-trait', currentQ.optA.trait);
            
            optionBBtn.innerText = currentQ.optB.text;
            optionBBtn.setAttribute('data-trait', currentQ.optB.trait);

            progressText.innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            const percentage = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressBarFill.style.width = `${percentage}%`;
        }

        function selectOption(opt) {
            const btn = opt === 'A' ? optionABtn : optionBBtn;
            const trait = btn.getAttribute('data-trait');
            if (trait) scores[trait]++;

            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        function calculateResult() {
            const typeE_I = scores.E >= scores.I ? 'E' : 'I';
            const typeS_N = scores.S >= scores.N ? 'S' : 'N';
            const typeT_F = scores.T >= scores.F ? 'T' : 'F';
            const typeJ_P = scores.J >= scores.P ? 'J' : 'P';

            const finalMBTI = `${typeE_I}${typeS_N}${typeT_F}${typeJ_P}`;
            const profile = mbtiProfiles[finalMBTI] || mbtiProfiles["INTJ"];

            quizScreen.classList.add('hidden-screen');
            resultScreen.classList.remove('hidden-screen');
            resultScreen.classList.add('fade-in-up');

            document.getElementById('result-mbti').innerText = finalMBTI;
            document.getElementById('result-title').innerText = profile.title;
            document.getElementById('result-desc').innerText = profile.desc;

            document.getElementById('stat-ei').innerText = `外向 ${scores.E} : 內向 ${scores.I}`;
            document.getElementById('stat-sn').innerText = `實感 ${scores.S} : 直覺 ${scores.N}`;
            document.getElementById('stat-tf').innerText = `理性 ${scores.T} : 感性 ${scores.F}`;
            document.getElementById('stat-jp').innerText = `判斷 ${scores.J} : 感知 ${scores.P}`;
        }
    </script>
</body>
</html>
